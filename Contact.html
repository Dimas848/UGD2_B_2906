<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <link rel="stylesheet" href="Stylesheet.css">
</head>
<body>
    <div class="container">
        <div class="left-side">
            <div class="home-icon">
                <a href="Index.html">🏠</a>
            </div>
            <div class="hero-text">
                <h1>Contact Me</h1>
                <p class="short-bio">Hubungi saya untuk kolaborasi atau pertanyaan lebih lanjut.</p>
            </div>
        </div>
        <div class="right-side">
            <nav class="navbar">
                <ul>
                    <li><a href="About.html">About me</a></li>
                    <li><a href="Skills.html">Skills</a></li>
                    <li><a href="Portfolio.html">Portfolio</a></li>
                    <li><a href="Contact.html" class="btn-contact" style="background-color: #66fcf1;">CONTACT ME</a></li>
                </ul>
            </nav>
            <div class="contact-content">
                <h2 class="contact-title">SEND MESSAGE</h2>
                <form class="contact-form">
                    <div class="form-group"><input type="text" placeholder="Enter your name*" required></div>
                    <div class="form-group"><input type="email" placeholder="Enter your email*" required></div>
                    <div class="form-group"><input type="tel" placeholder="Phone number"></div>
                    <div class="form-group"><textarea placeholder="Your message*" rows="5" required></textarea></div>
                    <button type="submit" class="btn-submit">SUBMIT</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
